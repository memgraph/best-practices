services:
  memgraph:
    image: memgraph/memgraph-mage:3.9.0
    container_name: memgraph-mage
    ports:
      - "7687:7687"
      - "7444:7444"
      - "9091:9091"
    command: ["--telemetry-enabled=false", "--log-level=TRACE", "--also-log-to-stderr=true"]
    volumes:
      - memgraph_data:/var/lib/memgraph
    networks:
      - memgraph-network

volumes:
  memgraph_data:

networks:
  memgraph-network:
    driver: bridge
