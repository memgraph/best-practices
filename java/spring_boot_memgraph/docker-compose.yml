services:
  memgraph:
    image: memgraph/memgraph-mage:3.10.1
    container_name: memgraph-spring-boot
    ports:
      - "7687:7687" # Bolt protocol (Spring Data Neo4j / Neo4j Java driver connect here)
      - "7444:7444" # Log streaming
      - "9091:9091" # Monitoring / metrics
    command: ["--log-level=TRACE", "--also-log-to-stderr=true"]

  lab:
    image: memgraph/lab:3.2.0
    container_name: memgraph-spring-boot-lab
    ports:
      - "3000:3000" # Memgraph Lab UI at http://localhost:3000
    depends_on:
      - memgraph
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
