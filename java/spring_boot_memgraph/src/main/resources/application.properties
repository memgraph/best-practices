# --- Memgraph connection -----------------------------------------------------
# Memgraph exposes the Bolt protocol on port 7687, exactly like Neo4j.
# To migrate a Spring Data Neo4j app from Neo4j to Memgraph you only change
# these three lines (a Neo4j project would point at neo4j+s://...).
spring.neo4j.uri=bolt://localhost:7687

# Memgraph runs without authentication by default. If you enabled auth
# (CREATE USER ...), put the credentials here; otherwise leave them blank.
spring.neo4j.authentication.username=
spring.neo4j.authentication.password=

# Memgraph has a single database, so do NOT set spring.data.neo4j.database.
# Setting it would make the driver issue `USE <db>` which Memgraph rejects.

# --- Web ---------------------------------------------------------------------
server.port=8080

# --- Logging (handy while exploring the generated Cypher) --------------------
logging.level.org.springframework.data.neo4j.cypher=DEBUG
