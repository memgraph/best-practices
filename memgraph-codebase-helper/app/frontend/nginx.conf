server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # /static/* is served directly from the site root so we can keep the same
  # paths as in dev (where FastAPI mounts the frontend at /static).
  location /static/ {
    alias /usr/share/nginx/html/;
    try_files $uri =404;
  }

  # API + SSE stream → proxy to the backend.
  # Buffering must be off so tokens stream to the browser in real time.
  location /api/ {
    proxy_pass http://backend:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding on;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
