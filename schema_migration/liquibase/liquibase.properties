# Liquibase connection properties for Memgraph
# The jdbc:neo4j: prefix is required by the liquibase-neo4j extension.
# Memgraph accepts connections via the Bolt protocol on port 7687.

url=jdbc:neo4j:bolt://memgraph:7687
# Memgraph Community Edition has no authentication by default.
# Set username/password if you have auth enabled.
# username=
# password=
