# Flyway configuration for Memgraph
# The jdbc:neo4j: prefix is handled by the Neo4j JDBC driver.
# Memgraph accepts connections via the Bolt protocol on port 7687.

flyway.url=jdbc:neo4j://memgraph:7687
flyway.locations=filesystem:/flyway/sql

# Accept .cypher files as migrations (in addition to the default .sql)
flyway.sqlMigrationSuffixes=.cypher

# Memgraph Community Edition has no authentication by default.
# Set user/password if you have auth enabled.
# flyway.user=
# flyway.password=
